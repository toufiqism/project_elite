name: project_elite
description: "Project Elite — a self-improvement app for discipline, study, fitness, prayer, and habit mastery."
publish_to: 'none'

version: 1.2.0+13  # semver+versionCode. Bump +N every Play upload; bump x.y.z on user-facing releases.

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # State management
  provider: ^6.1.2

  # Prayer times (offline calculation)
  adhan: ^2.0.0-nullsafety.2

  # Location for prayer times
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Step counting (hardware STEP_COUNTER sensor)
  pedometer: ^4.0.2

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1

  # Charts (analytics)
  fl_chart: ^0.69.0

  # Local notifications + timezone scheduling
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^4.0.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.2.1
  firebase_crashlytics: ^4.1.3

  # HTTP for fitness API
  http: ^1.2.2

  # Islamic features
  hijri: ^3.0.0
  flutter_compass: ^0.8.1

  # Reports — share-as-text via system share sheet
  share_plus: ^10.1.2

  # Open URLs (YouTube search for exercises)
  url_launcher: ^6.3.0

  # Reverse-geocoding for prayer location auto-detect
  geocoding: ^3.0.0

  # Native splash (preserve/remove API used in main.dart)
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/duas.json
    - assets/icon/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#0B0F14"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  adaptive_icon_monochrome: "assets/icon/icon_monochrome.png"

flutter_native_splash:
  color: "#0B0F14"
  image: "assets/icon/icon_foreground.png"
  android_12:
    image: "assets/icon/icon_foreground.png"
    color: "#0B0F14"
    icon_background_color: "#0B0F14"
  ios: true
  android: true
  fullscreen: true
