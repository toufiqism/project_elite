name: project_elite
description: "Project Elite — a self-improvement app for discipline, study, fitness, prayer, and habit mastery."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # State management
  provider: ^6.1.2

  # Prayer times (offline calculation)
  adhan: ^2.0.0-nullsafety.2

  # Location for prayer times
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1

  # Charts (analytics)
  fl_chart: ^0.69.0

  # Local notifications + timezone scheduling
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^4.0.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.2.1

  # HTTP for fitness API
  http: ^1.2.2

  # Islamic features
  hijri: ^3.0.0
  flutter_compass: ^0.8.1

  # Reports — share-as-text via system share sheet
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/duas.json
