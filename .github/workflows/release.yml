name: Play Internal Release

on:
  workflow_dispatch:        # manual trigger from the Actions tab
  push:
    branches: ['release']   # auto-release on push to this branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          EOF

      - run: flutter pub get

      - run: flutter test    # remove this line if the suite isn't green

      - name: Build AAB
        # run_number + 300 keeps versionCode above the live manual build (300)
        run: flutter build appbundle --release --build-number=$(( ${{ github.run_number }} + 300 ))

      - name: Generate release notes
        # Play "What's new" = latest commit subject. Capped at 500 chars per locale.
        run: |
          mkdir -p distribution/whatsnew
          git log -1 --pretty=%s | head -c 500 > distribution/whatsnew/whatsnew-en-US

      - name: Upload to Play closed testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.toufiq.elite.project_elite
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: alpha          # default closed track; change to your custom closed-track name if set
          status: completed
          inAppUpdatePriority: 5
          whatsNewDirectory: distribution/whatsnew
